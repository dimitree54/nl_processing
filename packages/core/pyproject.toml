[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nl-processing-core"
version = "1.0.3"
description = "Shared core package for nl_processing"
requires-python = ">=3.12"
dependencies = [
  "pydantic>=2.0,<3",
  "langchain-core>=0.3,<1",
  "langchain-openai>=0.3,<1",
  "numpy>=1.0,<3",
  "opencv-python>=4.0,<5",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["nl_processing.core*"]
namespaces = true

[dependency-groups]
dev = [
  "pytest>=9.0.2,<10",
  "pytest-asyncio>=1.3.0,<2",
  "pytest-xdist>=3.8.0,<4",
  "ruff>=0.15.0,<0.16",
  "pylint>=4.0.4,<5",
  "vulture>=2.14.0,<3",
]
