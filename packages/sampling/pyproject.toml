[build-system]
requires = ["setuptools", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "nl-processing-sampling"
version = "1.0.1"
description = "Sampling package for nl_processing"
requires-python = ">=3.12"
dependencies = [
  "nl-processing-core",
  "nl-processing-database",
]

[tool.setuptools.packages.find]
where = ["src"]
include = ["nl_processing.sampling*"]
namespaces = true

[dependency-groups]
dev = [
  "pytest>=9.0.2,<10",
  "pytest-asyncio>=1.3.0,<2",
  "pytest-xdist>=3.8.0,<4",
  "ruff>=0.15.0,<0.16",
  "pylint>=4.0.4,<5",
  "vulture>=2.14.0,<3",
  "nl-processing-database-cache",
]

[tool.uv.sources]
nl-processing-core = { path = "../core" }
nl-processing-database = { path = "../database" }
nl-processing-database-cache = { path = "../database_cache" }
