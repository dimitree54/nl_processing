name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: uv sync

      - name: Ruff format check
        run: uv run ruff format --check packages

      - name: Ruff lint
        run: uv run ruff check packages

      - name: Pylint – module size
        run: uvx pylint packages --disable=all --enable=C0302 --max-module-lines=200

      - name: Pylint – banned builtins
        run: uvx pylint packages --load-plugins=pylint.extensions.bad_builtin --disable=all --enable=W0141 --bad-functions=hasattr,getattr,setattr

      - name: Vulture – dead code
        run: uv run vulture packages vulture_whitelist.py

      - name: jscpd – copy-paste detection
        run: npx jscpd --exitCode 1 packages

  test:
    name: Tests (${{ matrix.package }})
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        package:
          - core
          - extract_text_from_image
          - extract_words_from_text
          - translate_text
          - translate_word
          - database
          - database_cache
          - sampling
    defaults:
      run:
        working-directory: packages/${{ matrix.package }}
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-groups

      - name: Unit tests
        run: |
          if [ -d tests/unit ]; then
            uv run pytest -n auto tests/unit
          fi

      - name: Integration tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -d tests/integration ]; then
            uv run pytest -n auto tests/integration
          fi

      - name: E2E tests
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -d tests/e2e ]; then
            uv run pytest -n auto tests/e2e
          fi
